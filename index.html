        {/* How it works */}
        <details style={{ marginBottom:16, background:"rgba(15,23,42,0.5)", border:"1px solid #1e293b", borderRadius:6, padding:"0" }}>
          <summary style={{ cursor:"pointer", padding:"10px 14px", fontSize:12, color:"#94a3b8", fontFamily:"var(--f)", lineHeight:1.6, listStyle:"none" }}>
            <span style={{ color:"#64748b", marginRight:6 }}>{"\u25B6"}</span>
            How are "earliest completion" and "attack-caused delay" calculated?
          </summary>
          <div style={{ padding:"0 14px 12px 14px", fontSize:12, color:"#64748b", fontFamily:"var(--f)", lineHeight:1.7 }}>
            <p style={{ margin:"10px 0" }}>
              <strong style={{ color:"#a5b4fc" }}>Core formula</strong>
            </p>
            <p style={{ margin:"8px 0" }}>
              Training is split into two phases. <strong style={{ color:"#94a3b8" }}>Pre-training</strong> ({"\u03B1"} {"\u00D7"} F_eff)
              must happen on a single cluster. <strong style={{ color:"#94a3b8" }}>Post-training</strong> ((1{"\u2212"}{"\u03B1"}) {"\u00D7"} F_eff)
              can be distributed across all of the company{"\u2019"}s available compute. Both phases benefit from
              algorithmic efficiency A(t) = 10^(rate {"\u00D7"} (t {"\u2212"} 2026.25)), which makes the same effective FLOPs
              cheaper to compute over time.
            </p>
            <p style={{ margin:"8px 0" }}>
              The company dedicates a fraction of its total compute to training ({(ALLOC_PEACE.training * 100).toFixed(0)}% in peacetime,
              adjustable via wartime reallocation). This caps both phases: pre-training uses
              min(largest_cluster, company_total {"\u00D7"} training%), and post-training uses
              national_surviving {"\u00D7"} company_share {"\u00D7"} training%.
            </p>

            <p style={{ margin:"16px 0 10px 0", borderTop:"1px solid #1e293b", paddingTop:12 }}>
              <strong style={{ color:"#a5b4fc" }}>Optimal start date</strong>
            </p>
            <p style={{ margin:"8px 0" }}>
              The model sweeps possible start dates and picks the one minimizing total completion time.
              Starting earlier means more raw grinding on limited hardware; starting later means algorithms
              have improved (reducing the effective FLOP cost) and the company{"\u2019"}s training budget has grown
              (as total compute scales up each year). The optimal point balances these.
            </p>

            <p style={{ margin:"16px 0 10px 0", borderTop:"1px solid #1e293b", paddingTop:12 }}>
              <strong style={{ color:"#a5b4fc" }}>Strike timing scenarios</strong>
            </p>
            <p style={{ margin:"8px 0", paddingLeft:12, borderLeft:"2px solid #334155" }}>
              <strong style={{ color:"#94a3b8" }}>Strike before training starts:</strong> Big clusters are destroyed.
              The country falls back to surviving hardware and re-optimizes from scratch.
            </p>
            <p style={{ margin:"8px 0", paddingLeft:12, borderLeft:"2px solid #334155" }}>
              <strong style={{ color:"#94a3b8" }}>Strike during pre-training:</strong> The run is interrupted. Checkpointing preserves
              all progress up to the strike. The remaining pre-training eFLOPs are computed based on how long the run
              had been going and at what throughput. The country then resumes on surviving hardware after a 1-month switchover.
            </p>
            <p style={{ margin:"8px 0", paddingLeft:12, borderLeft:"2px solid #334155" }}>
              <strong style={{ color:"#94a3b8" }}>Strike during post-training:</strong> Pre-training is already done.
              Completed post-training progress is preserved. The remaining post-training finishes on surviving total compute.
            </p>
            <p style={{ margin:"8px 0", paddingLeft:12, borderLeft:"2px solid #334155" }}>
              <strong style={{ color:"#94a3b8" }}>Strike after completion:</strong> The run already finished. Delay = 0.
            </p>

            <p style={{ margin:"16px 0 10px 0", borderTop:"1px solid #1e293b", paddingTop:12 }}>
              <strong style={{ color:"#a5b4fc" }}>Attack-caused delay</strong>
            </p>
            <p style={{ margin:"8px 0" }}>
              The model computes a <strong style={{ color:"#94a3b8" }}>no-attack baseline</strong> (earliest completion using all
              clusters) and a <strong style={{ color:"#94a3b8" }}>post-attack completion</strong> (using surviving clusters, accounting
              for any mid-run progress). The difference is the attack-caused delay. At high F_eff values, much of the wait
              exists regardless of any attack (waiting for algorithmic progress), so the attack-caused fraction may be small
              relative to total time.
            </p>
          </div>
        </details>

        <div style={{ display:"flex", gap:16, marginBottom:showAllGroups?8:20, flexWrap:"wrap" }}>
          {[{s:usS,label:"United States",flag:"",color:"#3b82f6",sd:effCnAtkStrikeDate},{s:cnS,label:"China",flag:"",color:"#d97706",sd:effUsAtkStrikeDate}].map(({s,label,flag,color,sd})=>{

            <div key={label} style={{ flex:1, minWidth:340, background:"rgba(15,23,42,0.6)", border:`1px solid ${color}22`, borderRadius:8, padding:"14px 16px" }}>

              <div style={{ display:"flex", gap:8, flexWrap:"wrap" }}>
                <MetricBox label="Sites disabled" value={s.disabled} sub={`${F(s.disabledGPUs)} GPUs (${s.totalGPUs>0?((s.disabledGPUs/s.totalGPUs)*100).toFixed(0)+"% of current":""})`} warn={s.disabled>0} />
                <MetricBox label="Sites to preempt" value={s.preempted} sub={s.preemptedGPUs>0?`${F(s.preemptedGPUs)} H100-eq (unbuilt)`:"none above threshold"} warn={s.preempted>0} />
                <MetricBox label="Compute destroyed" value={s.totalGPUs>0?((s.disabledGPUs/s.totalGPUs)*100).toFixed(0)+"%":"0%"}
                  sub={`${F(s.disabledGPUs)} of ${F(s.totalGPUs)} H100-eq at strike`}
                  warn={s.disabledGPUs/s.totalGPUs>0.5} good={s.disabledGPUs===0} />
                <MetricBox label="No-attack baseline" value={fmtDate(s.baselineDone)}
                  sub={s.baselineCluster?`${fmtDur(Math.max(0,s.baselineStart-NOW))} wait + ${fmtDur(Math.max(0,s.baselineDone-s.baselineStart))} train`:"no path"} />
                <MetricBox label="Earliest completion" value={fmtDate(s.earliestDone)}
                  sub={s.bestCluster?`via ${s.bestCluster.name.replace(" [EST]","")} (${s.bestStrategy})`:"no path"}
                  warn={s.earliestDone>2030} good={s.earliestDone-NOW<=1.5}
                  highlight />
                <MetricBox label="Attack-caused delay" value={s.attackDelay===Infinity||s.earliestDone>2050?">2050":fmtDur(s.attackDelay)}
                  sub={s.frozenYears>0&&s.attackDelay<Infinity&&s.attackDelay>0?`${((s.attackDelay/s.frozenYears)*100).toFixed(0)}% of total wait`:"—"}
                  warn={s.attackDelay>2} good={s.attackDelay<0.5&&s.attackDelay!==Infinity}
                  highlight />
                {(() => {
                  const ref = (s.disabled + s.preempted > 0) ? sd : NOW;
                  const waitTime = s.attackStart ? Math.max(0, s.attackStart - ref) : 0;
                  const trainTime = (s.attackStart && s.earliestDone < Infinity) ? Math.max(0, s.earliestDone - s.attackStart) : Infinity;
                  return <>
                    <MetricBox label="Wait time" value={fmtDur(waitTime)}
                      sub={waitTime > 0.08 ? "waiting for algo efficiency" : "starts immediately"}
                      warn={waitTime>2} good={waitTime<0.25} />
                    <MetricBox label="Training time" value={trainTime===Infinity?">2050":fmtDur(trainTime)}
                      sub={s.bestCluster?`on ${F(s.bestCluster.gpus)} H100-eq cluster`:"—"}
                      warn={trainTime>2} good={trainTime<0.5} />
                  </>;
                })()}
              </div>
            </div>
          );})}

          <div style={{ display:"flex", gap:16, marginTop:8, justifyContent:"center", flexWrap:"wrap" }}>
            <LI color="#3b82f6" label="US"/>
            <LI color="#d97706" label="China"/>
            <div style={{display:"flex",alignItems:"center",gap:5}}>
              <svg width={14} height={14} viewBox="0 0 14 14">
                <circle cx={7} cy={7} r={4.5} fill="#1e293b" stroke="#ef4444" strokeWidth={1.5}/>
                <line x1={4} y1={4} x2={10} y2={10} stroke="#ef4444" strokeWidth={1.5}/>

        {/* === Projection Charts === */}
        <div style={{ marginTop: 24, marginBottom: 8 }}>
          <span style={{ fontSize: 11, letterSpacing: 2, color: "#6366f1", textTransform: "uppercase", fontWeight: 600 }}>Compute Projections</span>
          <p style={{ fontSize: 12, color: "#475569", margin: "4px 0 16px 0", lineHeight: 1.5 }}>
            Based on AI Futures Project compute forecasts. Country shares from Epoch dataset (mid-2025): US 68.6%, China 17.6%.
            Leading company share within each country assumed proportional to the AIFP's global leading company share.
            {(usAtkSCActive || cnAtkSCActive) && <span style={{ color: "#f97316" }}>{" "}Supply chain disruption active.</span>}
          </p>
        </div>

        <div style={{ display: "flex", gap: 16, flexWrap: "wrap", marginBottom: 16 }}>
          {/* Global compute + Growth rate in one panel */}
          <div style={{ flex: "1 1 100%", background: "rgba(15,23,42,0.5)", border: "1px solid #1e293b", borderRadius: 8, padding: "16px", display: "flex", gap: 0 }}>
            <div style={{ flex: "0 0 auto" }}>
              <ProjectionChart
                title="Global AI Compute"
                subtitle={(usAtkSCActive || cnAtkSCActive) ? "Total H100-eq (AIFP + supply chain disruption)" : "Total H100-equivalents worldwide (AIFP projections)"}
                series={[
                  { data: projections.globalSeries, color: "#a78bfa", label: "Global", bold: true },
                ]}
                xMin={2022} xMax={2035} yMin={300000} yMax={10000000000}
                logY width={370} height={320}
                yLabel="H100-equivalents"
                xTicks={[2022, 2024, 2026, 2028, 2030, 2032, 2034]}
                yTicks={[1e6, 1e7, 1e8, 1e9, 1e10]}
                nowLine
              />
            </div>
            <div style={{ flex: "0 0 100px", paddingTop: 40, paddingLeft: 6, paddingRight: 6, borderLeft: "1px solid #1e293b22" }}>
              <StatItem label="2026" value={F(projections.adjAifpAt(2026).global)} color="#a78bfa" sub="current" />
              <StatItem label="2030" value={F(projections.adjAifpAt(2030).global)} color="#a78bfa" sub={`${(projections.adjAifpAt(2030).global / projections.adjAifpAt(2026).global).toFixed(0)}\u00D7 vs now`} />
              <StatItem label="2035" value={F(projections.adjAifpAt(2035).global)} color="#a78bfa" sub={`${(projections.adjAifpAt(2035).global / projections.adjAifpAt(2026).global).toFixed(0)}\u00D7 vs now`} />
            </div>
            <div style={{ flex: "0 0 auto", borderLeft: "1px solid #1e293b44" }}>
              <ProjectionChart
                title="Compute Growth Rate"
                subtitle="Year-over-year multiplier"
                series={[
                  { data: projections.growthSeries, color: "#c084fc", label: "Y/Y", bold: true },
                ]}
                xMin={2022} xMax={2035} yMin={1.0} yMax={3.2}
                logY={false} width={340} height={320}
                yLabel="Y/Y multiplier"
                yFormat={v => v.toFixed(1) + "\u00D7"}
                xTicks={[2023, 2025, 2027, 2029, 2031, 2033, 2035]}
                yTicks={[1.0, 1.5, 2.0, 2.5, 3.0]}
                nowLine
              />
            </div>
            {(() => {
              const g = projections.growthSeries;
              const at = yr => { const r = g.find(([y]) => y === yr); return r ? r[1] : null; };
              return (
                <div style={{ flex: "0 0 100px", paddingTop: 40, paddingLeft: 6, borderLeft: "1px solid #1e293b22" }}>
                  <StatItem label="Peak" value={`${at(2025)?.toFixed(2)}\u00D7`} color="#c084fc" sub="2025" />
                  <StatItem label="2026" value={`${at(2026)?.toFixed(2)}\u00D7`} color="#c084fc" sub="current" />
                  <StatItem label="2030" value={`${at(2030)?.toFixed(2)}\u00D7`} color="#c084fc" />
                  <StatItem label="2035" value={`${at(2035)?.toFixed(2)}\u00D7`} color="#c084fc" />
                </div>
              );
            })()}
          </div>
        </div>

        <div style={{ display: "flex", gap: 16, flexWrap: "wrap", marginBottom: 16 }}>
          {/* Algorithmic efficiency + stats */}
          <div style={{ flex: 1, minWidth: 500, background: "rgba(15,23,42,0.5)", border: "1px solid #1e293b", borderRadius: 8, padding: "16px", display: "flex", gap: 0 }}>
            <div style={{ flex: "1 1 auto", minWidth: 0 }}>
              {(() => {
                const anyStrike = usAtkEnabled || cnAtkEnabled;
                const allSeriesData = [
                  ...algoSeries,
                  ...(usS.baselineAlgoSeries || []),
                  ...(cnS.baselineAlgoSeries || []),
                  ...(anyStrike ? (usS.attackAlgoSeries || []) : []),
                  ...(anyStrike ? (cnS.attackAlgoSeries || []) : []),
                ];
                const maxVal = Math.max(...allSeriesData.map(d => d[1]).filter(v => v > 0), 10);
                const series = [
                  { data: algoSeries, color: "#14b8a6", label: "Baseline", bold: true },
                  { data: usS.baselineAlgoSeries || [], color: "#3b82f6", label: "US" },
                  { data: cnS.baselineAlgoSeries || [], color: "#d97706", label: "CN" },
                ];
                if (anyStrike) {
                  series.push({ data: usS.attackAlgoSeries || [], color: "#3b82f6", label: "US post-atk", dashed: true });
                  series.push({ data: cnS.attackAlgoSeries || [], color: "#d97706", label: "CN post-atk", dashed: true });
                }
                return (
                  <ProjectionChart
                    title="Algorithmic Efficiency Multiplier"
                    subtitle={rate > 0 ? `${halvingMonths}-month halving (${rate.toFixed(2)} OOM/yr present-day, accelerates with compute)` : "No algorithmic improvement"}
                    series={series}
                    xMin={2024} xMax={2035} yMin={0.8} yMax={maxVal}
                    logY width={400} height={320}
                    yLabel="Effective FLOP multiplier"
                    yFormat={v => v >= 1000 ? (v / 1000).toFixed(0) + "K\u00D7" : v >= 10 ? v.toFixed(0) + "\u00D7" : v.toFixed(1) + "\u00D7"}
                    xTicks={[2024, 2026, 2028, 2030, 2032, 2034]}
                    yTicks={(() => {
                      const ticks = [1];
                      let v = 2;
                      while (v <= maxVal * 2) { ticks.push(v); v *= (v < 100 ? 2 : v < 10000 ? 5 : 10); }
                      return ticks.slice(0, 8);
                    })()}
                    nowLine
                  />
                );
              })()}
            </div>
            {(() => {
              const m30 = rate > 0 ? Math.pow(10, rate * (2030 - ALGO_EPOCH)) : 1;
              const m35 = rate > 0 ? Math.pow(10, rate * (2035 - ALGO_EPOCH)) : 1;
              const fmtM = v => v >= 1000 ? (v/1000).toFixed(1) + "K\u00D7" : v >= 10 ? v.toFixed(0) + "\u00D7" : v.toFixed(1) + "\u00D7";
              return (
                <div style={{ flex: "0 0 120px", paddingTop: 40, paddingLeft: 8, borderLeft: "1px solid #1e293b22" }}>
                  <StatItem label="Present rate" value={rate > 0 ? `${rate.toFixed(2)} OOM/yr` : "0"} color="#14b8a6" sub={`${halvingMonths}mo halving`} />
                  <StatItem label="Elasticity" value={ALGO_COMPUTE_ELASTICITY} color="#14b8a6" sub="diminishing returns" />
                  <StatItem label="2030 (flat)" value={fmtM(m30)} color="#14b8a6" sub="constant rate ref." />
                  <StatItem label="2035 (flat)" value={fmtM(m35)} color="#14b8a6" sub="constant rate ref." />
                </div>
              );
            })()}
          </div>
          {/* placeholder for future chart */}
          <div style={{ flex: 1, minWidth: 500 }} />
        </div>

        {/* US compute + allocation */}
        <div style={{ background: "rgba(15,23,42,0.5)", border: "1px solid #1e293b", borderRadius: 8, padding: "16px", display: "flex", gap: 0, marginBottom: 16 }}>
          <div style={{ flex: "1 1 auto", minWidth: 0 }}>
            <ProjectionChart
              title="United States Compute"
              subtitle={usNatEnabled ? `National total and leading co. (nationalized ${Math.floor(usNatDate)}, 90% of national)` : "National total and leading company (68.6% of global)"}
              series={[
                { data: projections.usTotalSeries, color: "#3b82f6", label: "US total", bold: true },
                { data: projections.usLeadingSeries, color: "#60a5fa", label: usNatEnabled ? "Lead co. (nat.)" : "Leading co.", dashed: true },
                { data: projections.usTrainingSeries, color: "#818cf8", label: `Training (${(alloc.training*100).toFixed(0)}%)`, dashed: true },
              ]}
              xMin={2024} xMax={2035} yMin={0} yMax={5000000000}
              width={380} height={340}
              yLabel="H100-equivalents"
              xTicks={[2024, 2026, 2028, 2030, 2032, 2034]}
              yTicks={[0, 500000000, 1000000000, 2000000000, 3000000000, 4000000000, 5000000000]}
              yFormat={v => v === 0 ? "0" : (v/1e9).toFixed(1)+"B"}
              nowLine
            />
          </div>
          <div style={{ flex: "0 0 auto", paddingTop: 20, paddingLeft: 4, borderLeft: "1px solid #1e293b22" }}>
            {(() => {
              const d30 = projections.adjAifpAt(2030);
              const lead30 = (usNatEnabled && 2030 >= usNatDate) ? d30.usTotal * 0.9 : d30.usLead;
              return <AllocationPie alloc={alloc} wartime={wartime} setWartime={setWartime} accentColor="#60a5fa" title="US Allocation" width={220} height={290} stats={[
                { label: "Lead co. 2030", value: F(lead30), color: "#60a5fa", sub: `${((usNatEnabled && 2030 >= usNatDate) ? 90 : (d30.natShare * 100)).toFixed(0)}% of national` },
              ]} />;
            })()}
          </div>
          {(() => {
            const d26 = projections.adjAifpAt(2026), d30 = projections.adjAifpAt(2030), d35 = projections.adjAifpAt(2035);
            const lead = (d, yr) => (usNatEnabled && yr >= usNatDate) ? d.usTotal * 0.9 : d.usLead;
            const share = (d, yr) => (usNatEnabled && yr >= usNatDate) ? 0.9 : d.natShare;
            return (
              <div style={{ flex: "0 0 130px", paddingTop: 40, paddingLeft: 8, borderLeft: "1px solid #1e293b22" }}>
                <StatItem label="US total 2026" value={F(d26.usTotal)} color="#3b82f6" />
                <StatItem label="US total 2030" value={F(d30.usTotal)} color="#3b82f6" />
                <StatItem label="US total 2035" value={F(d35.usTotal)} color="#3b82f6" />
                <div style={{ borderTop: "1px solid #1e293b", margin: "6px 0", paddingTop: 6 }} />
                <StatItem label="Lead co. 2026" value={F(lead(d26,2026))} color="#60a5fa" sub={`${(share(d26,2026) * 100).toFixed(0)}% of national`} />
                <StatItem label="Lead co. 2030" value={F(lead(d30,2030))} color="#60a5fa" sub={`${(share(d30,2030) * 100).toFixed(0)}% of national`} />
                <StatItem label="Lead co. 2035" value={F(lead(d35,2035))} color="#60a5fa" sub={`${(share(d35,2035) * 100).toFixed(0)}% of national`} />
              </div>
            );
          })()}
        </div>

        {/* China compute + allocation */}
        <div style={{ background: "rgba(15,23,42,0.5)", border: "1px solid #1e293b", borderRadius: 8, padding: "16px", display: "flex", gap: 0, marginBottom: 20 }}>
          <div style={{ flex: "1 1 auto", minWidth: 0 }}>
            <ProjectionChart
              title="China Compute"
              subtitle={cnNatEnabled ? `National total and leading co. (nationalized ${Math.floor(cnNatDate)}, 90% of national)` : "National total and leading company (17.6% of global)"}
              series={[
                { data: projections.chinaTotalSeries, color: "#d97706", label: "China total", bold: true },
                { data: projections.chinaLeadingSeries, color: "#fbbf24", label: cnNatEnabled ? "Lead co. (nat.)" : "Leading co.", dashed: true },
                { data: projections.cnTrainingSeries, color: "#818cf8", label: `Training (${(alloc.training*100).toFixed(0)}%)`, dashed: true },
              ]}
              xMin={2024} xMax={2035} yMin={0} yMax={1000000000}
              width={380} height={340}
              yLabel="H100-equivalents"
              xTicks={[2024, 2026, 2028, 2030, 2032, 2034]}
              yTicks={[0, 200000000, 400000000, 600000000, 800000000, 1000000000]}
              yFormat={v => v === 0 ? "0" : (v/1e6).toFixed(0)+"M"}
              nowLine
            />
          </div>
          <div style={{ flex: "0 0 auto", paddingTop: 20, paddingLeft: 4, borderLeft: "1px solid #1e293b22" }}>
            {(() => {
              const d30 = projections.adjAifpAt(2030);
              const lead30 = (cnNatEnabled && 2030 >= cnNatDate) ? d30.cnTotal * 0.9 : d30.cnLead;
              return <AllocationPie alloc={alloc} wartime={false} accentColor="#fbbf24" title="CN Allocation" width={220} height={290} stats={[
                { label: "Lead co. 2030", value: F(lead30), color: "#fbbf24", sub: `${((cnNatEnabled && 2030 >= cnNatDate) ? 90 : (d30.natShare * 100)).toFixed(0)}% of national` },
              ]} />;
            })()}
          </div>
          {(() => {
            const d26 = projections.adjAifpAt(2026), d30 = projections.adjAifpAt(2030), d35 = projections.adjAifpAt(2035);
            const lead = (d, yr) => (cnNatEnabled && yr >= cnNatDate) ? d.cnTotal * 0.9 : d.cnLead;
            const share = (d, yr) => (cnNatEnabled && yr >= cnNatDate) ? 0.9 : d.natShare;
            return (
              <div style={{ flex: "0 0 130px", paddingTop: 40, paddingLeft: 8, borderLeft: "1px solid #1e293b22" }}>
                <StatItem label="CN total 2026" value={F(d26.cnTotal)} color="#d97706" />
                <StatItem label="CN total 2030" value={F(d30.cnTotal)} color="#d97706" />
                <StatItem label="CN total 2035" value={F(d35.cnTotal)} color="#d97706" />
                <div style={{ borderTop: "1px solid #1e293b", margin: "6px 0", paddingTop: 6 }} />
                <StatItem label="Lead co. 2026" value={F(lead(d26,2026))} color="#fbbf24" sub={`${(share(d26,2026) * 100).toFixed(0)}% of national`} />
                <StatItem label="Lead co. 2030" value={F(lead(d30,2030))} color="#fbbf24" sub={`${(share(d30,2030) * 100).toFixed(0)}% of national`} />
                <StatItem label="Lead co. 2035" value={F(lead(d35,2035))} color="#fbbf24" sub={`${(share(d35,2035) * 100).toFixed(0)}% of national`} />
              </div>
            );
          })()}
        </div>

        <details style={{ marginTop:16, background:"rgba(15,23,42,0.4)", borderRadius:6, border:"1px solid #1e293b", padding:"0" }}>
          <summary style={{ cursor:"pointer", padding:"12px 14px", fontSize:12, color:"#94a3b8", fontFamily:"var(--f)", lineHeight:1.6, listStyle:"none" }}>
            <span style={{ color:"#64748b", marginRight:6 }}>{"\u25B6"}</span>
            Model details, data sources, and parameter justifications
          </summary>
          <div style={{ padding:"0 14px 14px 14px", fontSize:12, color:"#64748b", fontFamily:"var(--f)", lineHeight:1.7 }}>

            <p style={{ margin:"10px 0", borderBottom:"1px solid #1e293b", paddingBottom:8 }}>
              <strong style={{ color:"#94a3b8" }}>Core formula:</strong>{" "}
              Run time = F_eff / (A(t) {"\u00D7"} N {"\u00D7"} p {"\u00D7"} {"\u03B7"} {"\u00D7"} u), where
              A(t) = 2^((t {"\u2212"} 2026) / halving_time) is the algorithmic efficiency multiplier.
            </p>

            <p style={{ margin:"10px 0" }}>
              <strong style={{ color:"#94a3b8" }}>Terminology:</strong>{" "}
              "Disabled" means an existing datacenter is taken offline by sabotage.{" "}
              "Preempted" means a planned datacenter that has not yet been built is prevented from coming
              online in the first place (e.g. through export controls, construction delays, or targeted disruption
              before it becomes operational).
              {" "}"Supply chain disruption" models mutual attacks on GPU manufacturing and semiconductor
              supply chains. When enabled, new compute buildout after the strike date is reduced by 90%,
              reflecting destroyed fabs, export blockades, and disrupted logistics. This shrinks all
              planned datacenters and simulated future builds proportionally.
            </p>

            <p style={{ margin:"10px 0", borderTop:"1px solid #1e293b", paddingTop:8 }}>
              <strong style={{ color:"#94a3b8" }}>Default parameter values:</strong>
            </p>
            <p style={{ margin:"6px 0", paddingLeft:12, borderLeft:"2px solid #334155" }}>
              <strong style={{ color:"#94a3b8" }}>Sabotage threshold: 50K H100-eq.</strong>{" "}
              Roughly the scale of the largest clusters that were operational in late 2024 (Tesla Cortex Ph1,
              xAI Colossus Ph1). Serves as a mid-range default; the presets let you explore more or less
              aggressive scenarios.
            </p>
            <p style={{ margin:"6px 0", paddingLeft:12, borderLeft:"2px solid #334155" }}>
              <strong style={{ color:"#94a3b8" }}>F_eff: effective FLOP target.</strong>{" "}
              GPT-4 was approximately 2{"\u00D7"}10^25 FLOP (per Epoch AI).
              Higher values represent larger frontier runs or future capability milestones.
              Presets range from GPT-4 scale to 10^32.
            </p>
            <p style={{ margin:"6px 0", paddingLeft:12, borderLeft:"2px solid #334155" }}>
              <strong style={{ color:"#94a3b8" }}>Algo halving time: 9 months (~3x/yr).</strong>{" "}
              Epoch AI's analysis of algorithmic efficiency trends in language modeling finds compute
              requirements halving roughly every 5-14 months depending on the benchmark and time period.
              9 months sits in the middle of that range and reflects the recent acceleration in
              architectural and training improvements.
            </p>
            <p style={{ margin:"6px 0", paddingLeft:12, borderLeft:"2px solid #334155" }}>
              <strong style={{ color:"#94a3b8" }}>Precision: BF16 (p = 9.9{"\u00D7"}10^14 FLOP/s), fixed.</strong>{" "}
              The H100 SXM spec sheet lists 989.5 TFLOP/s for BF16. All effective FLOP targets
              (F_eff) in this tool are denominated in BF16 operations, matching the convention used by
              the AI Futures Project and most published training compute estimates. This avoids the 2x
              ambiguity that arises from mixing FP8 hardware specs with BF16-denominated FLOP budgets.
            </p>
            <p style={{ margin:"6px 0", paddingLeft:12, borderLeft:"2px solid #334155" }}>
              <strong style={{ color:"#94a3b8" }}>MFU (Model FLOP Utilization): 43%.</strong>{" "}
              Fraction of BF16 peak throughput actually realized during training. Published MLPerf
              benchmarks and training reports (Google's PaLM, Meta's LLaMA) show MFU of 30-50%
              at scale. The gap comes from communication overhead during all-reduce, pipeline bubbles,
              memory bandwidth limits, and load imbalance. 43% matches the AI Futures Project's
              implied per-chip throughput and reflects a well-tuned frontier run on matched hardware.
            </p>
            <p style={{ margin:"6px 0", paddingLeft:12, borderLeft:"2px solid #334155" }}>
              <strong style={{ color:"#94a3b8" }}>Utilization: 90%.</strong>{" "}
              Fraction of wall-clock time the cluster spends on productive training (forward/backward passes).
              The remainder is lost to hardware failures and restarts (daily at 10K+ GPUs), checkpointing,
              maintenance, and scheduling gaps. A dedicated crash program on well-maintained hardware can sustain 90-95%;
              a shared commercial cluster or improvised post-disruption setup would be lower (50-75%).
            </p>

            <p style={{ margin:"10px 0", borderTop:"1px solid #1e293b", paddingTop:8 }}>
              <strong style={{ color:"#94a3b8" }}>Data sources:</strong>{" "}
              Data from merged Epoch AI GPU clusters dataset and Epoch Frontier Datacenter Timelines
              (satellite imagery and permit analysis). China Epoch entries are anonymized. Three confirmed
              Chinese entries added from public sources: DeepSeek V3 cluster (2,048 H800s), Baidu Kunlun
              P800 cluster (30K chips, ~10.5K H100-eq), and DeepSeek full fleet estimate (~50K GPUs,
              ~24.5K H100-eq per SemiAnalysis/Scale AI). Multi-phase site expansions are linked and count
              as a single target. UAE Stargate projects classified as US-allied.
            </p>
          </div>
        </details>

      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
